<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        width: 340px;
        margin: 0;
        padding: 14px;
        color: #1e293b;
      }
      h1 { font-size: 15px; margin: 0 0 8px; }
      .muted { color: #64748b; font-size: 12px; }
      select, button {
        width: 100%;
        box-sizing: border-box;
        font-size: 13px;
        border-radius: 8px;
      }
      select {
        margin-top: 8px;
        padding: 8px;
        border: 1px solid #cbd5e1;
      }
      button {
        margin-top: 8px;
        border: 0;
        padding: 9px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary { background: #16a34a; color: #fff; }
      .secondary { background: #0f172a; color: #fff; }
      .ghost { background: #f1f5f9; color: #0f172a; }
      .link { font-size: 12px; color: #4f46e5; text-decoration: none; }
      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
      #msg { margin-top: 10px; font-size: 12px; }
      .good { color: #15803d; }
      .bad { color: #b91c1c; }
      hr { border: 0; border-top: 1px solid #e2e8f0; margin: 12px 0; }
    </style>
  </head>
  <body>
    <h1>Auto-Apply Assistant</h1>
    <div id="content"><p class="muted">Loading…</p></div>
    <script src="popup.js"></script>
  </body>
</html>
