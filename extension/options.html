<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Auto-Apply Assistant — Settings</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 460px;
        margin: 24px auto;
        padding: 0 16px;
        color: #1e293b;
      }
      h1 { font-size: 18px; }
      label { display: block; font-weight: 600; margin-top: 16px; font-size: 14px; }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 6px;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
      }
      p { font-size: 13px; color: #475569; }
      button {
        margin-top: 18px;
        background: #4f46e5;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      .ok { color: #15803d; font-weight: 600; margin-top: 12px; font-size: 14px; }
      code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Auto-Apply Assistant — Settings</h1>
    <p>
      Find both values in your portal under <strong>My Profile →
      Connect your browser extension</strong>.
    </p>

    <label for="portalUrl">Portal address</label>
    <input id="portalUrl" placeholder="https://your-portal.vercel.app" />
    <p>The web address of your Auto-Apply Portal — no trailing slash needed.</p>

    <label for="token">Access token</label>
    <input id="token" placeholder="paste your token (or 'demo' to try it)" />

    <button id="save">Save</button>
    <div id="status" class="ok" hidden>Saved ✓</div>

    <script src="options.js"></script>
  </body>
</html>
